services:
  - type: web
    name: meridian
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: DB_PATH
        value: /opt/render/project/data/meridian.db
    disk:
      name: meridian-data
      mountPath: /opt/render/project/data
      sizeGB: 1
